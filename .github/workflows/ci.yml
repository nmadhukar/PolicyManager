name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: policy
          POSTGRES_PASSWORD: policy
          POSTGRES_DB: policymanager
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U policy -d policymanager"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://policy:policy@localhost:5432/policymanager?schema=policytracker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
