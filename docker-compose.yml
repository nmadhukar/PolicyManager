services:
  postgres:
    # pgvector/pgvector:pg16 = Postgres 16 with the pgvector extension preinstalled
    # (ADR-0002). Drop-in for postgres:16-alpine — same PG16 cluster format, same
    # pgdata volume — but ships the `vector` extension the RAG embedding store needs.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: policy
      POSTGRES_PASSWORD: policy
      POSTGRES_DB: policymanager
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U policy -d policymanager"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  gotenberg:
    image: gotenberg/gotenberg:8
    ports:
      - "3001:3000"

  onlyoffice:
    image: onlyoffice/documentserver:latest
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: "change-me-onlyoffice"
    ports:
      - "8080:80"
    volumes:
      - onlyofficedata:/var/www/onlyoffice/Data
    # The Docs server fetches document bytes + posts save callbacks to the API
    # running on the host. On Docker Desktop host.docker.internal resolves
    # automatically; this mapping makes it resolve on Linux hosts too.
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  miniodata:
  onlyofficedata:
